<!DOCTYPE html>

<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>WebRTC Debug</title>
<style>
body { font-family: monospace; background: #111; color: #0f0; padding: 1rem; font-size: 12px; }
button { background: #0f0; color: #000; border: none; padding: .5rem 1rem; margin: .3rem; cursor: pointer; font-family: monospace; }
#log { white-space: pre-wrap; word-break: break-all; }
.err { color: #f00; }
.ok { color: #0f0; }
.info { color: #ff0; }
input { background: #222; color: #0f0; border: 1px solid #0f0; padding: .3rem; font-family: monospace; width: 100%; margin: .2rem 0; box-sizing: border-box; }
</style>
</head>
<body>
<h2>🔬 VAULT CHAT DEBUG</h2>
<input id="wsUrl" value="wss://vault-chat.onrender.com">
<button onclick="createRoom()">HOST: Raum erstellen</button>
<br>
<input id="roomInput" placeholder="Room ID eingeben">
<button onclick="joinRoom()">GAST: Beitreten</button>
<br><br>
<button onclick="startCall()">📞 Anrufen</button>
<button onclick="acceptCall()">✅ Annehmen</button>
<button onclick="clearLog()">🗑 Log löschen</button>
<br><br>
<div id="log"></div>

<script>
const ICE_CONFIG = {
  iceServers:[
    {urls:'stun:stun.relay.metered.ca:80'},
    {urls:'turn:global.relay.metered.ca:80',username:'e0b167a936e336520543b014',credential:'5vmFnvfsAOm4rrsd'},
    {urls:'turn:global.relay.metered.ca:80?transport=tcp',username:'e0b167a936e336520543b014',credential:'5vmFnvfsAOm4rrsd'},
    {urls:'turn:global.relay.metered.ca:443',username:'e0b167a936e336520543b014',credential:'5vmFnvfsAOm4rrsd'},
    {urls:'turns:global.relay.metered.ca:443?transport=tcp',username:'e0b167a936e336520543b014',credential:'5vmFnvfsAOm4rrsd'}
  ],
  iceTransportPolicy: 'relay',
  iceCandidatePoolSize: 10
};

let ws, pc, localStream, roomId, role;
let pendingIce = [];
let incomingOffer = null;

function log(msg, type='info') {
  const d = document.getElementById('log');
  const t = new Date().toTimeString().slice(0,8);
  d.innerHTML += `<span class="${type}">[${t}] ${msg}</span>\n`;
  d.scrollTop = d.scrollHeight;
}
function clearLog() { document.getElementById('log').innerHTML = ''; }

function initWS(url) {
  ws = new WebSocket(url);
  ws.onclose = () => log('WebSocket getrennt', 'err');
  ws.onerror = () => log('WebSocket Fehler', 'err');
  ws.onmessage = e => {
    const msg = JSON.parse(e.data);
    log('← ' + JSON.stringify(msg).slice(0, 200));
    if (msg.type === 'CREATED') {
      roomId = msg.roomId;
      log('✅ Room ID: ' + roomId, 'ok');
    }
    if (msg.type === 'GUEST_JOINED') log('✅ Gast beigetreten!', 'ok');
    if (msg.type === 'JOINED') log('✅ Raum beigetreten', 'ok');
    if (msg.type === 'RELAY') handleRelay(msg.data);
  };
  return new Promise(res => { ws.onopen = () => { log('✅ WebSocket verbunden', 'ok'); res(); }; });
}

async function createRoom() {
  role = 'host';
  await initWS(document.getElementById('wsUrl').value);
  ws.send(JSON.stringify({type:'CREATE'}));
  log('→ CREATE gesendet');
}

async function joinRoom() {
  role = 'guest';
  roomId = document.getElementById('roomInput').value.trim();
  if (!roomId) { log('Room ID eingeben!', 'err'); return; }
  await initWS(document.getElementById('wsUrl').value);
  ws.send(JSON.stringify({type:'JOIN', roomId}));
  log('→ JOIN gesendet für: ' + roomId);
}

function wsRelay(data) {
  ws.send(JSON.stringify({type:'RELAY', data}));
  log('→ RELAY: ' + data.type);
}

function setupPC() {
  pc = new RTCPeerConnection(ICE_CONFIG);
  log('RTCPeerConnection erstellt');

  pc.onicecandidate = e => {
    if (e.candidate) {
      const c = e.candidate.candidate;
      const typ = c.includes('typ relay') ? '🟢 RELAY' :
                  c.includes('typ srflx') ? '🟡 SRFLX' : '🔵 HOST';
      log('ICE: ' + typ + ' — ' + c.slice(0, 80));
      wsRelay({type:'ICE', candidate:e.candidate});
    } else {
      log('✅ ICE Gathering abgeschlossen', 'ok');
    }
  };

  pc.oniceconnectionstatechange = () => {
    const s = pc.iceConnectionState;
    log('ICE State: ' + s, s === 'connected' || s === 'completed' ? 'ok' : s === 'failed' ? 'err' : 'info');
  };
  pc.onconnectionstatechange = () => log('Connection: ' + pc.connectionState);
  pc.onsignalingstatechange = () => log('Signaling: ' + pc.signalingState);

  pc.ontrack = e => {
    log('🎉 AUDIO TRACK EMPFANGEN!', 'ok');
    const audio = new Audio();
    audio.srcObject = e.streams[0];
    audio.play().then(() => log('▶️ Audio spielt!', 'ok')).catch(err => log('Audio play Fehler: ' + err, 'err'));
  };
}

async function startCall() {
  log('--- ANRUF STARTEN ---', 'ok');
  try {
    localStream = await navigator.mediaDevices.getUserMedia({audio:true});
    log('✅ Mikrofon OK', 'ok');
    setupPC();
    localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
    const offer = await pc.createOffer({offerToReceiveAudio:true});
    await pc.setLocalDescription(offer);
    log('Offer erstellt');
    wsRelay({type:'CALL_OFFER', sdp:offer});
  } catch(e) { log('FEHLER: ' + e.message, 'err'); }
}

async function acceptCall() {
  if (!incomingOffer) { log('Kein eingehender Anruf!', 'err'); return; }
  log('--- ANRUF ANNEHMEN ---', 'ok');
  try {
    localStream = await navigator.mediaDevices.getUserMedia({audio:true});
    log('✅ Mikrofon OK', 'ok');
    setupPC();
    localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
    await pc.setRemoteDescription(new RTCSessionDescription(incomingOffer.sdp));
    log('Remote Description gesetzt');
    for (const c of pendingIce) { await pc.addIceCandidate(c); log('Gepufferter ICE angewendet'); }
    pendingIce = [];
    const answer = await pc.createAnswer();
    await pc.setLocalDescription(answer);
    log('Answer erstellt');
    wsRelay({type:'CALL_ANSWER', sdp:answer});
  } catch(e) { log('FEHLER: ' + e.message, 'err'); }
}

async function handleRelay(data) {
  if (data.type === 'CALL_OFFER') {
    log('📞 Eingehender Anruf!', 'ok');
    incomingOffer = data;
    log('→ "Annehmen" klicken!');
  }
  if (data.type === 'CALL_ANSWER' && pc) {
    await pc.setRemoteDescription(new RTCSessionDescription(data.sdp));
    log('✅ Answer empfangen', 'ok');
    for (const c of pendingIce) { await pc.addIceCandidate(c); log('Gepufferter ICE angewendet'); }
    pendingIce = [];
  }
  if (data.type === 'ICE') {
    const c = new RTCIceCandidate(data.candidate);
    if (pc && pc.remoteDescription) {
      await pc.addIceCandidate(c);
      log('ICE hinzugefügt ✅');
    } else {
      pendingIce.push(c);
      log('ICE gepuffert (' + pendingIce.length + ')');
    }
  }
}
</script>

</body>
</html>
